<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraLink — Emotional Wellbeing Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #050810;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(0,212,255,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 70%, rgba(168,85,247,0.05) 0%, transparent 60%);
}
.container { max-width: 480px; }
.logo {
  font-family: 'Orbitron', monospace;
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #00d4ff, #00ffb3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.tagline {
  font-size: 18px;
  color: #94a3b8;
  margin-bottom: 40px;
  line-height: 1.5;
}
.launch-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 48px;
  border-radius: 16px;
  border: none;
  background: linear-gradient(135deg, #00d4ff, rgba(0,212,255,0.6));
  color: #000;
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: all .3s;
  box-shadow: 0 0 30px rgba(0,212,255,0.2);
}
.launch-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 50px rgba(0,212,255,0.4);
}
.launch-btn:active { transform: translateY(0); }
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 100px;
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.15);
  font-size: 12px;
  font-weight: 600;
  color: #00d4ff;
  margin-bottom: 24px;
}
.badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #00ffb3;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,179,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(0,255,179,0); }
}
.status {
  margin-top: 32px;
  font-size: 14px;
  color: #64748b;
}
</style>
</head>
<body>
<div class="container">
  <div class="badge"><span class="badge-dot"></span> Real-time Emotion Monitoring</div>
  <div class="logo">AuraLink</div>
  <p class="tagline">Emotional wellbeing monitor for individuals with autism and their caregivers.</p>
  <a href="http://localhost:5173" target="_blank" class="launch-btn">
    🚀 Launch App
  </a>
  <div class="status">Works in Chrome and Edge on desktop &amp; mobile</div>
</div>
</body>
</html>
